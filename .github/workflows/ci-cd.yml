name: CI/CD — Build & Deploy to EC2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────
  #  1. Lint & Test
  # ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy lints
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

  # ─────────────────────────────────────────────
  #  2. Build & Push Docker Image
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up swap space
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  # ─────────────────────────────────────────────
  #  3. Deploy to EC2
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          EC2_USER: ${{ secrets.EC2_USER }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_TOKEN,GH_ACTOR,IMAGE,EC2_USER
          script: |
            set -e
            IMAGE_LC=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')

            # Login to GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            # Pull latest image
            docker pull "$IMAGE_LC:latest"

            # Stop old container
            docker stop video-hls-api 2>/dev/null || true
            docker rm video-hls-api 2>/dev/null || true

            # Ensure .env file exists
            ENV_FILE="/home/$EC2_USER/video-hls-api/.env"
            if [ ! -f "$ENV_FILE" ]; then
              echo "❌ Missing $ENV_FILE on EC2. Create it before deploying."
              exit 1
            fi

            # Start new container
            docker run -d \
              --name video-hls-api \
              --restart unless-stopped \
              --env-file "$ENV_FILE" \
              -p 8080:8080 \
              -v "/home/$EC2_USER/video-hls-api/playlists:/app/playlists" \
              "$IMAGE_LC:latest"

            # Health check
            echo "Waiting for health check…"
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8080/api/v1/health > /dev/null 2>&1; then
                echo "✅ Deployment successful!"
                exit 0
              fi
              sleep 2
            done
            echo "❌ Health check failed"
            docker logs video-hls-api --tail 50
            exit 1
